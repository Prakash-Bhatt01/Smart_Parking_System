services:
  - type: web
    name: smartpark
    env: python
    buildCommand: "./build.sh"
    startCommand: "gunicorn smart_parking.wsgi:application"
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0
      - key: DJANGO_SETTINGS_MODULE
        value: smart_parking.settings
      - key: DEBUG
        value: "False"
      - key: SECRET_KEY
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: smartpark-db
          property: connectionString
      - key: ALLOWED_HOSTS
        value: ".onrender.com"
      - key: WEB_CONCURRENCY
        value: "2"

databases:
  - name: smartpark-db
    databaseName: smartpark
    user: smartpark_user
    plan: free
